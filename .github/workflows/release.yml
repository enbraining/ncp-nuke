name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.1) — builds without creating a tag release"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14   # Apple Silicon mac (Xcode + codesign available)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install packaging tools
        run: brew install mingw-w64 makensis msitools

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "v=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            REF="${{ github.ref_name }}"; echo "v=${REF#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all GUI artifacts (DMG, Windows exe/setup/MSI)
        run: bash scripts/build-release.sh "${{ steps.ver.outputs.v }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ncp-nuke-${{ steps.ver.outputs.v }}
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NCP-Nuke_*
            dist/checksums.txt
