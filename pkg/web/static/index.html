<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NCP Nuke</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2029; --border: #2a3340; --text: #e6e6e6;
    --muted: #8a94a3; --accent: #04b575; --danger: #ff4d4f; --danger-bg: #2a1416;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; margin: 0; }
  header .badge { color: var(--muted); font-size: 13px; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px; display: grid; gap: 20px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .panel h2 { font-size: 14px; margin: 0 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  .actions { display: flex; flex-wrap: wrap; gap: 10px; }
  .action-btn { flex: 1 1 200px; padding: 14px; border-radius: 8px; border: 1px solid var(--border);
    background: #11161d; color: var(--text); cursor: pointer; font-size: 14px; text-align: left; transition: .12s; }
  .action-btn:hover { border-color: var(--accent); }
  .action-btn.selected { border-color: var(--accent); background: #0e1f1a; }
  .action-btn.danger.selected { border-color: var(--danger); background: var(--danger-bg); }
  .action-btn small { display: block; color: var(--muted); margin-top: 4px; font-size: 12px; }
  label.opt { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 14px; }
  input[type=text], input[type=password] { background: #11161d; border: 1px solid var(--border);
    color: var(--text); padding: 9px 11px; border-radius: 7px; font-size: 14px; width: 100%; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; margin-top: 12px; }
  .field { flex: 1 1 240px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .run { margin-top: 16px; display: flex; gap: 12px; align-items: center; }
  button.primary { background: var(--accent); color: #052b1f; border: none; padding: 11px 22px;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button.primary.danger { background: var(--danger); color: #fff; }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  #log { background: #0a0e12; border: 1px solid var(--border); border-radius: 8px; padding: 14px;
    font-size: 13px; line-height: 1.5; height: 420px; overflow-y: auto; }
  #log .placeholder { color: var(--muted); font-size: 13px; }
  .acct-card { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .acct-head { background: #141b24; padding: 9px 12px; font-weight: 600; color: #6cb6ff;
    border-bottom: 1px solid var(--border); font-size: 13px; }
  .global-line { color: var(--muted); font-size: 12.5px; padding: 4px 2px; }
  .section { border-top: 1px solid #1c242e; }
  .section:first-child { border-top: none; }
  .section > summary { list-style: none; cursor: pointer; padding: 9px 12px; display: flex;
    align-items: center; gap: 8px; font-size: 13px; }
  .section > summary::-webkit-details-marker { display: none; }
  .section > summary::before { content: "▸"; color: var(--muted); font-size: 11px; transition: .12s; }
  .section[open] > summary::before { transform: rotate(90deg); }
  .section .sec-num { color: var(--accent); font-weight: 600; min-width: 20px; }
  .section .sec-title { flex: 1; }
  .section .sec-badge { font-size: 11px; padding: 1px 7px; border-radius: 10px; background: #1c242e; color: var(--muted); }
  .section .sec-badge.fail { background: var(--danger-bg); color: var(--danger); }
  .section .sec-badge.ok { background: #0e1f1a; color: var(--accent); }
  .details { padding: 2px 12px 10px 40px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; line-height: 1.55; }
  .details .dline { white-space: pre-wrap; word-break: break-word; }
  .log-fail { color: var(--danger); }
  .log-ok { color: var(--accent); }
  .log-skip { color: var(--muted); }
  .log-info { color: var(--text); }
  /* resource summary (list view) */
  .res-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; padding: 14px; }
  .res-chip { display: flex; align-items: center; gap: 12px; background: #11161d; border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 15px; }
  .res-chip .ic { font-size: 22px; line-height: 1; }
  .res-chip .nm { flex: 1; font-size: 13.5px; }
  .res-chip .ct { font-size: 17px; font-weight: 700; color: var(--accent); }
  .res-chip .unit { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 2px; }
  .res-empty { padding: 26px; text-align: center; color: var(--muted); font-size: 14px; }
  .res-total { padding: 12px 14px 0; color: var(--muted); font-size: 12.5px; }
  .scan-note { padding: 4px 14px 14px; }
  .scan-note summary { color: var(--muted); font-size: 12px; cursor: pointer; }
  .scan-note .dline { font-size: 11.5px; padding-top: 4px; }
  .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .checkbox-cell { width: 40px; text-align: center; }
  .confirm-box { margin-top: 12px; padding: 12px; border: 1px solid var(--danger);
    background: var(--danger-bg); border-radius: 8px; display: none; }
  .confirm-box.show { display: block; }
  .confirm-box strong { color: var(--danger); }
</style>
</head>
<body>
<header>
  <h1>🧨 NCP Nuke</h1>
  <span class="badge">Sub Account & Resource 관리 콘솔</span>
</header>
<main>
  <div class="panel">
    <h2>1. 대상 계정 선택</h2>
    <table>
      <thead><tr>
        <th class="checkbox-cell"><input type="checkbox" id="selAll"></th>
        <th>Account Name</th><th>IAM Username</th><th>Access Key</th>
      </tr></thead>
      <tbody id="accts"><tr><td colspan="4" style="color:var(--muted)">불러오는 중...</td></tr></tbody>
    </table>

    <details id="addPanel" style="margin-top:14px">
      <summary style="cursor:pointer;color:var(--accent);font-size:13px">+ 계정 추가 (엑셀 파일에도 저장됨)</summary>
      <div class="row">
        <div class="field"><label>Account Name (선택)</label><input type="text" id="naAccount" placeholder="자동 생성"></div>
        <div class="field"><label>IAM Username *</label><input type="text" id="naIam" placeholder="서브 계정 LoginId"></div>
      </div>
      <div class="row">
        <div class="field"><label>Access Key *</label><input type="text" id="naAccess"></div>
        <div class="field"><label>Secret Key *</label><input type="password" id="naSecret"></div>
        <div class="field"><label>Password (선택)</label><input type="text" id="naPassword" placeholder="활성화 시 비밀번호"></div>
      </div>
      <div class="run">
        <button class="primary" id="addBtn">계정 추가</button>
        <span class="hint" id="addHint"></span>
      </div>
    </details>
  </div>

  <div class="panel">
    <h2>2. 작업 선택</h2>
    <div class="actions" id="actions">
      <button class="action-btn" data-action="activate">Sub Account 활성화<small>비밀번호 초기화 포함</small></button>
      <button class="action-btn" data-action="deactivate">Sub Account 비활성화<small>로그인 차단</small></button>
      <button class="action-btn danger" data-action="nuke">리소스 전체 삭제<small>모든 리소스 영구 삭제 (서브계정 유지)</small></button>
      <button class="action-btn" data-action="list">리소스 전체 조회<small>읽기 전용</small></button>
    </div>

    <label class="opt" id="cleanupOpt" style="display:none">
      <input type="checkbox" id="cleanup"> 비활성화 시 리소스도 함께 삭제 (Cleanup)
    </label>

    <div class="row" id="passwordRow" style="display:none">
      <div class="field">
        <label>공통 비밀번호 (비우면 자동 생성)</label>
        <input type="password" id="password" placeholder="활성화 시 적용할 비밀번호">
      </div>
    </div>

    <div class="confirm-box" id="confirmBox">
      <div>⚠ <strong>되돌릴 수 없는 작업</strong>입니다. 계속하려면 아래에 <strong>CONFIRM DELETE</strong> 를 입력하세요.</div>
      <div class="row"><div class="field"><input type="text" id="confirm" placeholder="CONFIRM DELETE"></div></div>
    </div>

    <div class="run">
      <button class="primary" id="runBtn" disabled>실행</button>
      <span class="hint" id="runHint">계정과 작업을 선택하세요.</span>
    </div>
  </div>

  <div class="panel">
    <h2>3. 진행 로그</h2>
    <div id="log"><div class="placeholder">작업을 실행하면 단계별 진행 상황이 여기에 표시됩니다.</div></div>
  </div>
</main>

<script>
const state = { accounts: [], selected: new Set(), action: null, running: false };

async function loadAccounts() {
  const res = await fetch('/api/accounts');
  state.accounts = await res.json();
  const tb = document.getElementById('accts');
  tb.innerHTML = '';
  if (!state.accounts.length) {
    tb.innerHTML = '<tr><td colspan="4" style="color:var(--muted)">계정이 없습니다.</td></tr>';
    return;
  }
  for (const a of state.accounts) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="checkbox-cell"><input type="checkbox" data-idx="${a.index}"></td>
      <td>${esc(a.accountName)}</td><td>${esc(a.iamUsername)}</td><td>${esc(a.accessKey)}</td>`;
    tb.appendChild(tr);
  }
  tb.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const idx = +cb.dataset.idx;
      cb.checked ? state.selected.add(idx) : state.selected.delete(idx);
      updateRun();
    });
  });
}

document.getElementById('selAll').addEventListener('change', e => {
  document.querySelectorAll('#accts input[type=checkbox]').forEach(cb => {
    cb.checked = e.target.checked;
    const idx = +cb.dataset.idx;
    e.target.checked ? state.selected.add(idx) : state.selected.delete(idx);
  });
  updateRun();
});

document.querySelectorAll('.action-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.action = btn.dataset.action;
    document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('cleanupOpt').style.display = state.action === 'deactivate' ? 'flex' : 'none';
    document.getElementById('passwordRow').style.display = state.action === 'activate' ? 'flex' : 'none';
    updateRun();
  });
});

document.getElementById('cleanup').addEventListener('change', updateRun);
document.getElementById('confirm').addEventListener('input', updateRun);

function isDestructive() {
  return state.action === 'nuke' || (state.action === 'deactivate' && document.getElementById('cleanup').checked);
}

function updateRun() {
  const btn = document.getElementById('runBtn');
  const hint = document.getElementById('runHint');
  const confirmBox = document.getElementById('confirmBox');
  const destructive = isDestructive();
  confirmBox.classList.toggle('show', destructive);
  btn.classList.toggle('danger', destructive);

  let ok = state.selected.size > 0 && state.action && !state.running;
  if (destructive && document.getElementById('confirm').value !== 'CONFIRM DELETE') ok = false;
  btn.disabled = !ok;

  if (state.running) hint.textContent = '실행 중...';
  else if (!state.selected.size) hint.textContent = '계정을 선택하세요.';
  else if (!state.action) hint.textContent = '작업을 선택하세요.';
  else if (destructive && document.getElementById('confirm').value !== 'CONFIRM DELETE')
    hint.textContent = 'CONFIRM DELETE 를 입력하세요.';
  else hint.textContent = `${state.selected.size}개 계정 대상`;
}

document.getElementById('runBtn').addEventListener('click', run);

// Friendly Korean labels + icons per resource category.
const RES_META = {
  'Server': {ko:'서버', icon:'🖥️'},
  'Block Storage': {ko:'블록 스토리지', icon:'💽'},
  'Block Storage Snapshot': {ko:'블록 스토리지 스냅샷', icon:'📸'},
  'Public IP': {ko:'공인 IP', icon:'🌐'},
  'NAS Volume': {ko:'NAS 볼륨', icon:'🗄️'},
  'NAS Snapshot': {ko:'NAS 스냅샷', icon:'📸'},
  'Load Balancer': {ko:'로드밸런서', icon:'⚖️'},
  'Target Group': {ko:'타깃 그룹', icon:'🎯'},
  'Cloud DB': {ko:'Cloud DB', icon:'🛢️'},
  'Cloud PostgreSQL': {ko:'PostgreSQL', icon:'🐘'},
  'Cloud MongoDB': {ko:'MongoDB', icon:'🍃'},
  'Cloud MariaDB': {ko:'MariaDB', icon:'🛢️'},
  'Cloud MySQL': {ko:'MySQL', icon:'🐬'},
  'Cloud Redis': {ko:'Redis', icon:'🧊'},
  'VPC': {ko:'VPC', icon:'🧩'},
  'Subnet': {ko:'서브넷', icon:'🔲'},
  'NAT Gateway': {ko:'NAT 게이트웨이', icon:'🚪'},
  'VPC Peering': {ko:'VPC 피어링', icon:'🔗'},
  'Network ACL': {ko:'네트워크 ACL', icon:'🛡️'},
  'Route Table': {ko:'라우트 테이블', icon:'🧭'},
  'Access Control Group': {ko:'접근 제어 그룹(ACG)', icon:'🔐'},
  'Auto Scaling Group': {ko:'오토 스케일링 그룹', icon:'📈'},
  'Launch Configuration': {ko:'런치 설정', icon:'🚀'},
  'NKS Cluster': {ko:'쿠버네티스(NKS)', icon:'☸️'},
  'Init Script': {ko:'Init 스크립트', icon:'📜'},
  'Login Key': {ko:'로그인 키', icon:'🔑'},
  'Placement Group': {ko:'물리 배치 그룹', icon:'🧱'},
  'Object Storage': {ko:'오브젝트 스토리지', icon:'📦'},
  'Sub Account': {ko:'서브 계정', icon:'👤'},
};
function resMeta(key) { return RES_META[key] || {ko: key, icon: '•'}; }

// Rendering context. Sections are grouped by resource per account card.
const view = { log: null, card: null, sections: null, sectionCount: 0, listMode: false };

function resetLog() {
  const log = document.getElementById('log');
  log.innerHTML = '';
  view.log = log; view.card = null; view.sections = null; view.sectionCount = 0;
  view.listMode = state.action === 'list';
}

async function run() {
  state.running = true; updateRun();
  resetLog();
  const body = {
    selected: [...state.selected],
    action: state.action,
    password: document.getElementById('password').value,
    cleanup: document.getElementById('cleanup').checked,
    confirm: document.getElementById('confirm').value,
  };
  try {
    const res = await fetch('/api/run', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
    });
    if (!res.ok) { handleEvent({type:'global', text:'[오류] ' + (await res.text()), status:'fail'}); return; }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      let nl;
      while ((nl = buf.indexOf('\n\n')) >= 0) {
        const chunk = buf.slice(0, nl); buf = buf.slice(nl + 2);
        for (const line of chunk.split('\n')) {
          if (line.startsWith('data: ')) {
            const payload = line.slice(6);
            if (payload === 'end') continue;
            try { handleEvent(JSON.parse(payload)); } catch (_) {}
          }
        }
      }
    }
  } catch (e) {
    handleEvent({type:'global', text:'[오류] ' + e.message, status:'fail'});
  } finally {
    state.running = false; updateRun();
  }
}

function statusClass(s) {
  return s === 'fail' ? 'log-fail' : s === 'ok' ? 'log-ok' : s === 'skip' ? 'log-skip' : 'log-info';
}

function handleEvent(ev) {
  const log = view.log || document.getElementById('log');
  if (ev.type === 'account') {
    const name = ev.text.replace(/^\[루트 계정:\s*/, '').replace(/\]$/, '');
    const card = document.createElement('div');
    card.className = 'acct-card';
    card.innerHTML = `<div class="acct-head">🗂 ${esc(name)}</div>`;
    log.appendChild(card);
    view.card = card; view.sections = {}; view.sectionCount = 0;
  } else if (view.listMode) {
    handleListEvent(ev);
  } else if (ev.type === 'resource') {
    const sec = sectionFor(ev.resource, log);
    const d = document.createElement('div');
    d.className = 'dline ' + statusClass(ev.status);
    d.style.paddingLeft = Math.max(0, (ev.depth - 1)) * 14 + 'px';
    d.textContent = ev.text;
    sec.querySelector('.details').appendChild(d);
    if (ev.status === 'fail') markSection(sec, 'fail', '실패');
    else if (ev.status === 'ok' && !sec.dataset.fail) markSection(sec, 'ok', '완료');
  } else { // global
    const g = document.createElement('div');
    g.className = 'global-line ' + statusClass(ev.status);
    g.textContent = ev.text;
    (view.card || log).appendChild(g);
  }
  log.scrollTop = log.scrollHeight;
}

// List view: render a friendly grid of resource counts; tuck scan warnings away.
function handleListEvent(ev) {
  const card = view.card || view.log;
  if (ev.type === 'resource') {
    const m = ev.text.match(/:\s*([\d,]+)\s*개/);
    if (m) {
      addResChip(card, ev.resource, m[1]);
    } else if (ev.status === 'skip' || ev.status === 'fail') {
      addScanNote(card, ev.text);
    }
  } else if (ev.text.includes('리소스 없음')) {
    markEmpty(card);
  }
}

function gridOf(card) {
  let g = card.querySelector('.res-grid');
  if (!g) { g = document.createElement('div'); g.className = 'res-grid'; card.appendChild(g); }
  return g;
}

function addResChip(card, resource, count) {
  const empty = card.querySelector('.res-empty'); if (empty) empty.remove();
  const meta = resMeta(resource);
  const chip = document.createElement('div');
  chip.className = 'res-chip';
  chip.innerHTML = `<span class="ic">${meta.icon}</span><span class="nm">${esc(meta.ko)}</span>` +
    `<span class="ct">${esc(count)}<span class="unit">개</span></span>`;
  gridOf(card).appendChild(chip);
}

function markEmpty(card) {
  if (card.querySelector('.res-grid') || card.querySelector('.res-empty')) return;
  const e = document.createElement('div');
  e.className = 'res-empty';
  e.textContent = '🎉 삭제할 리소스가 없습니다.';
  card.appendChild(e);
}

function addScanNote(card, text) {
  let note = card.querySelector('.scan-note');
  if (!note) {
    note = document.createElement('div');
    note.className = 'scan-note';
    note.innerHTML = '<details><summary>조회 참고 (권한 없음/미사용 항목)</summary><div class="body"></div></details>';
    card.appendChild(note);
  }
  const d = document.createElement('div');
  d.className = 'dline log-skip';
  d.textContent = text;
  note.querySelector('.body').appendChild(d);
}

// sectionFor returns the resource section in the current card, creating it
// (numbered, collapsible) on first use so all lines for a resource group together.
function sectionFor(resource, log) {
  if (!view.sections) { view.sections = {}; }
  if (view.sections[resource]) return view.sections[resource];
  view.sectionCount++;
  const meta = resMeta(resource);
  const sec = document.createElement('details');
  sec.className = 'section'; sec.open = true;
  sec.innerHTML = `<summary><span class="sec-num">${view.sectionCount}.</span>` +
    `<span class="sec-title">${meta.icon} ${esc(meta.ko)}</span>` +
    `<span class="sec-badge" style="display:none"></span></summary>` +
    `<div class="details"></div>`;
  (view.card || log).appendChild(sec);
  view.sections[resource] = sec;
  return sec;
}

function markSection(sec, cls, label) {
  if (cls === 'fail') sec.dataset.fail = '1';
  const b = sec.querySelector('.sec-badge');
  if (!b) return;
  b.className = 'sec-badge ' + cls; b.textContent = label; b.style.display = '';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

document.getElementById('addBtn').addEventListener('click', addAccount);

async function addAccount() {
  const btn = document.getElementById('addBtn');
  const hint = document.getElementById('addHint');
  const body = {
    accountName: document.getElementById('naAccount').value.trim(),
    iamUsername: document.getElementById('naIam').value.trim(),
    accessKey: document.getElementById('naAccess').value.trim(),
    secretKey: document.getElementById('naSecret').value.trim(),
    password: document.getElementById('naPassword').value,
  };
  if (!body.accessKey || !body.secretKey || !body.iamUsername) {
    hint.style.color = 'var(--danger)';
    hint.textContent = 'Access Key, Secret Key, IAM Username은 필수입니다.';
    return;
  }
  btn.disabled = true; hint.style.color = 'var(--muted)'; hint.textContent = '저장 중...';
  try {
    const res = await fetch('/api/accounts', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
    });
    if (!res.ok) {
      hint.style.color = 'var(--danger)';
      hint.textContent = '실패: ' + (await res.text());
      return;
    }
    hint.style.color = 'var(--accent)';
    hint.textContent = '추가됨 (엑셀 파일에 저장)';
    ['naAccount','naIam','naAccess','naSecret','naPassword'].forEach(id => document.getElementById(id).value = '');
    await loadAccounts();
  } catch (e) {
    hint.style.color = 'var(--danger)';
    hint.textContent = '오류: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

loadAccounts();
</script>
</body>
</html>
